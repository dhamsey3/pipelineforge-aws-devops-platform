name: PipelineForge CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r pipelineforge/app/requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 pipelineforge/app/app.py
      - name: Run tests
        run: |
          echo "No tests yet. Add tests to pipelineforge/app/tests/"
      - name: Build Docker image
        run: |
          docker build -t pipelineforge-app:ci pipelineforge/app
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipelineforge-app-image
          path: pipelineforge/app
