name: PipelineForge CI

on:
  push:
    branches: [ main ]
    paths:
      - 'pipelineforge/**'
      - '.github/workflows/pipelineforge-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'pipelineforge/**'
      - '.github/workflows/pipelineforge-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipelineforge/app/requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 --max-line-length=100 pipelineforge/app/app.py
      - name: Run tests
        run: |
          python -m unittest discover -s pipelineforge/app -p 'test_*.py'
      - name: Build Docker image
        run: |
          docker build -t pipelineforge-app:ci pipelineforge/app
