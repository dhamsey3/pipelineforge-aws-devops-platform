AWSTemplateFormatVersion: '2010-09-09'
Description: >
  PipelineForge Main Stack - Orchestrates all nested stacks for the CI/CD platform.

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name (e.g., dev, prod)
    Default: dev

Resources:
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./network.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
  IAMStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./iam.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
  ECRStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./ecr.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
  ECSStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./ecs.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
  CodeArtifactStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./codeartifact.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
  DynamoDBStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./dynamodb.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
  CodeBuildStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./codebuild.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
  CodePipelineStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./codepipeline.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
  MonitoringStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./monitoring.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName

Outputs:
  EnvironmentName:
    Description: Name of the environment
    Value: !Ref EnvironmentName
