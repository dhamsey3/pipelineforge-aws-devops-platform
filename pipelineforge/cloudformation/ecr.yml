AWSTemplateFormatVersion: '2010-09-09'
Description: PipelineForge ECR Repository

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name (e.g., dev, prod)

Resources:
  AppECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${EnvironmentName}-pipelineforge-app'
      ImageTagMutability: MUTABLE
      EncryptionConfiguration:
        EncryptionType: AES256
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": { "type": "expire" }
              }
            ]
          }

Outputs:
  AppECRRepositoryUri:
    Description: URI of the ECR repository
    Value: !GetAtt AppECRRepository.RepositoryUri
    Export:
      Name: !Sub '${EnvironmentName}-AppECRRepositoryUri'
