AWSTemplateFormatVersion: '2010-09-09'
Description: PipelineForge ECS Cluster, Task, and Service

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name (e.g., dev, prod)
  VPCId:
    Type: String
    Description: VPC Id
  PublicSubnet1Id:
    Type: String
    Description: Public Subnet 1 Id
  PublicSubnet2Id:
    Type: String
    Description: Public Subnet 2 Id
  PrivateSubnet1Id:
    Type: String
    Description: Private Subnet 1 Id
  PrivateSubnet2Id:
    Type: String
    Description: Private Subnet 2 Id
  AppECRRepositoryUri:
    Type: String
    Description: ECR Repository URI
  AppTableName:
    Type: String
    Description: DynamoDB deployments table name
  DesiredCount:
    Type: Number
    Description: Number of ECS tasks to run
    Default: 1
    MinValue: 0
  ECSTaskExecutionRoleArn:
    Type: String
    Description: ECS task execution role ARN
  ECSTaskAppRoleArn:
    Type: String
    Description: ECS application task role ARN

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${EnvironmentName}-pipelineforge-cluster'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  AppTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${EnvironmentName}-pipelineforge-task'
      Cpu: 256
      Memory: 512
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref ECSTaskExecutionRoleArn
      TaskRoleArn: !Ref ECSTaskAppRoleArn
      ContainerDefinitions:
        - Name: app
          Image: !Ref AppECRRepositoryUri
          Essential: true
          PortMappings:
            - ContainerPort: 5000
          Environment:
            - Name: APP_TABLE_NAME
              Value: !Ref AppTableName
          HealthCheck:
            Command:
              - CMD-SHELL
              - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2)"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 30
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub '/ecs/${EnvironmentName}-pipelineforge-app'
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: ecs

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${EnvironmentName}-pipelineforge-app'
      RetentionInDays: 30

  AppALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow public HTTP to the application load balancer
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-alb-sg'

  AppServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow traffic from ALB to ECS tasks
      VpcId: !Ref VPCId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          SourceSecurityGroupId: !Ref AppALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-ecs-service-sg'

  AppALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${EnvironmentName}-pipelineforge-alb'
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id
      SecurityGroups:
        - !Ref AppALBSecurityGroup

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VPCId
      Protocol: HTTP
      Port: 5000
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200

  AppListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  AppService:
    Type: AWS::ECS::Service
    DependsOn: AppListener
    Properties:
      Cluster: !Ref ECSCluster
      ServiceName: !Sub '${EnvironmentName}-pipelineforge-service'
      TaskDefinition: !Ref AppTaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref AppServiceSecurityGroup
          Subnets:
            - !Ref PublicSubnet1Id
            - !Ref PublicSubnet2Id
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 5000
          TargetGroupArn: !Ref AppTargetGroup
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100

Outputs:
  ECSClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${EnvironmentName}-ECSClusterName'
  AppServiceName:
    Description: ECS service name
    Value: !GetAtt AppService.Name
    Export:
      Name: !Sub '${EnvironmentName}-AppServiceName'
  AppALBDNSName:
    Description: Application Load Balancer DNS Name
    Value: !GetAtt AppALB.DNSName
    Export:
      Name: !Sub '${EnvironmentName}-AppALBDNSName'
