AWSTemplateFormatVersion: '2010-09-09'
Description: PipelineForge CodePipeline

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name (e.g., dev, prod)
  CodePipelineServiceRoleArn:
    Type: String
    Description: CodePipeline Service Role ARN
  AppCodeBuildProjectName:
    Type: String
    Description: CodeBuild Project Name
  AppECRRepositoryUri:
    Type: String
    Description: ECR Repository URI
  ECSClusterName:
    Type: String
    Description: ECS Cluster Name
  AppALBDNSName:
    Type: String
    Description: Application Load Balancer DNS Name

Resources:
  AppPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub '${EnvironmentName}-pipelineforge-pipeline'
      RoleArn: !Ref CodePipelineServiceRoleArn
      ArtifactStore:
        Type: S3
        Location: !Sub '${EnvironmentName}-pipelineforge-artifacts'
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: 1
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                Owner: <GITHUB_OWNER>
                Repo: <GITHUB_REPO>
                Branch: main
                OAuthToken: <GITHUB_TOKEN>
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              Configuration:
                ProjectName: !Ref AppCodeBuildProjectName
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: Deploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: 1
              InputArtifacts:
                - Name: BuildOutput
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub '${EnvironmentName}-pipelineforge-app-stack'
                Capabilities: CAPABILITY_NAMED_IAM
                TemplatePath: BuildOutput::cloudformation/ecs.yml
              RunOrder: 1
      RestartExecutionOnUpdate: true

Outputs:
  AppPipelineName:
    Description: CodePipeline Name
    Value: !Ref AppPipeline
    Export:
      Name: !Sub '${EnvironmentName}-AppPipelineName'
