AWSTemplateFormatVersion: '2010-09-09'
Description: PipelineForge CodePipeline

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name (e.g., dev, prod)
  CodePipelineServiceRoleArn:
    Type: String
    Description: CodePipeline Service Role ARN
  CloudFormationExecutionRoleArn:
    Type: String
    Description: CloudFormation execution role ARN for app stack deployments
  AppCodeBuildProjectName:
    Type: String
    Description: CodeBuild Project Name
  AppECRRepositoryUri:
    Type: String
    Description: ECR Repository URI
  VPCId:
    Type: String
    Description: VPC Id
  PublicSubnet1Id:
    Type: String
    Description: Public Subnet 1 Id
  PublicSubnet2Id:
    Type: String
    Description: Public Subnet 2 Id
  PrivateSubnet1Id:
    Type: String
    Description: Private Subnet 1 Id
  PrivateSubnet2Id:
    Type: String
    Description: Private Subnet 2 Id
  AppTableName:
    Type: String
    Description: DynamoDB deployments table name
  ECSTaskExecutionRoleArn:
    Type: String
    Description: ECS task execution role ARN
  ECSTaskAppRoleArn:
    Type: String
    Description: ECS application task role ARN
  GitHubOwner:
    Type: String
    Description: GitHub organization or user that owns the source repository
  GitHubRepo:
    Type: String
    Description: GitHub source repository name
  GitHubBranch:
    Type: String
    Description: GitHub branch to deploy
    Default: main
  GitHubOAuthToken:
    Type: String
    Description: GitHub OAuth token for CodePipeline source access
    NoEcho: true
  CertificateArn:
    Type: String
    Description: Optional ACM certificate ARN for HTTPS on the public load balancer
    Default: ''

Resources:
  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${EnvironmentName}-pipelineforge-artifacts-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  AppPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub '${EnvironmentName}-pipelineforge-pipeline'
      RoleArn: !Ref CodePipelineServiceRoleArn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: 1
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                Owner: !Ref GitHubOwner
                Repo: !Ref GitHubRepo
                Branch: !Ref GitHubBranch
                OAuthToken: !Ref GitHubOAuthToken
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              Configuration:
                ProjectName: !Ref AppCodeBuildProjectName
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: Deploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: 1
              InputArtifacts:
                - Name: BuildOutput
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub '${EnvironmentName}-pipelineforge-app-stack'
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !Ref CloudFormationExecutionRoleArn
                TemplatePath: BuildOutput::cloudformation/ecs.yml
                ParameterOverrides: !Sub |
                  {
                    "EnvironmentName": "${EnvironmentName}",
                    "VPCId": "${VPCId}",
                    "PublicSubnet1Id": "${PublicSubnet1Id}",
                    "PublicSubnet2Id": "${PublicSubnet2Id}",
                    "PrivateSubnet1Id": "${PrivateSubnet1Id}",
                    "PrivateSubnet2Id": "${PrivateSubnet2Id}",
                    "AppECRRepositoryUri": "${AppECRRepositoryUri}:latest",
                    "AppTableName": "${AppTableName}",
                    "DesiredCount": "2",
                    "ECSTaskExecutionRoleArn": "${ECSTaskExecutionRoleArn}",
                    "ECSTaskAppRoleArn": "${ECSTaskAppRoleArn}",
                    "CertificateArn": "${CertificateArn}"
                  }
              RunOrder: 1
      RestartExecutionOnUpdate: true

Outputs:
  AppPipelineName:
    Description: CodePipeline Name
    Value: !Ref AppPipeline
    Export:
      Name: !Sub '${EnvironmentName}-AppPipelineName'
