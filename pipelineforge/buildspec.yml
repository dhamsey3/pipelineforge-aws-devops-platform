# buildspec.yml for PipelineForge
version: 0.2
env:
  parameter-store:
    ECR_REPO: "/ECR_REPO"
    AWS_REGION: "/AWS_REGION"
    IMAGE_TAG: "/IMAGE_TAG"
    SNS_TOPIC_ARN: "/SNS_TOPIC_ARN"
phases:
  install:
    runtime-versions:
      docker: 20
    commands:
      - echo Installing dependencies
      - pip install -r app/requirements.txt
  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws --version
      - $(aws ecr get-login --no-include-email --region $AWS_REGION)
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:0:7}
  build:
    commands:
      - echo Build started on `date`
      - docker build -t $ECR_REPO:$IMAGE_TAG ./app
      - docker tag $ECR_REPO:$IMAGE_TAG $ECR_REPO:latest
  post_build:
    commands:
      - echo Build completed on `date`
      - docker push $ECR_REPO:$IMAGE_TAG
      - docker push $ECR_REPO:latest
      - >
        aws cloudformation deploy \
          --template-file cloudformation/ecs.yml \
          --stack-name pipelineforge-app-stack \
          --capabilities CAPABILITY_NAMED_IAM \
          --parameter-overrides \
            EnvironmentName=dev \
            VPCId=$VPC_ID \
            PublicSubnet1Id=$PUBLIC_SUBNET_1 \
            PublicSubnet2Id=$PUBLIC_SUBNET_2 \
            PrivateSubnet1Id=$PRIVATE_SUBNET_1 \
            PrivateSubnet2Id=$PRIVATE_SUBNET_2 \
            AppECRRepositoryUri=$ECR_REPO:$IMAGE_TAG \
            ECSServiceRoleArn=$ECS_SERVICE_ROLE_ARN
      - >
        aws sns publish \
          --topic-arn $SNS_TOPIC_ARN \
          --message "PipelineForge deployment complete: $IMAGE_TAG"
artifacts:
  files:
    - '**/*'
