AWSTemplateFormatVersion: '2010-09-09'
Description: PipelineForge DynamoDB Table

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name (e.g., dev, prod)

Resources:
  AppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${EnvironmentName}-pipelineforge-app-table'
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-pipelineforge-app-table'

Outputs:
  AppTableName:
    Description: DynamoDB Table Name
    Value: !Ref AppTable
    Export:
      Name: !Sub '${EnvironmentName}-AppTableName'
