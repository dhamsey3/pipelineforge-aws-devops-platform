AWSTemplateFormatVersion: '2010-09-09'
Description: PipelineForge Monitoring and Notifications

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name (e.g., dev, prod)

Resources:
  DeploymentSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${EnvironmentName}-pipelineforge-deployments'
      DisplayName: PipelineForge Deployment Notifications

  PipelineFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${EnvironmentName}-pipelineforge-pipeline-failure'
      AlarmDescription: 'Alarm for CodePipeline failures'
      Namespace: 'AWS/CodePipeline'
      MetricName: 'PipelineExecutionFailed'
      Dimensions:
        - Name: PipelineName
          Value: !Sub '${EnvironmentName}-pipelineforge-pipeline'
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref DeploymentSNSTopic

  ECSServiceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${EnvironmentName}-pipelineforge-ecs-service-failure'
      AlarmDescription: 'Alarm for ECS service unhealthy task count'
      Namespace: 'AWS/ECS'
      MetricName: 'UnhealthyTaskCount'
      Dimensions:
        - Name: ClusterName
          Value: !Sub '${EnvironmentName}-pipelineforge-cluster'
        - Name: ServiceName
          Value: !Sub '${EnvironmentName}-pipelineforge-service'
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref DeploymentSNSTopic

Outputs:
  DeploymentSNSTopicArn:
    Description: SNS Topic ARN for deployment notifications
    Value: !Ref DeploymentSNSTopic
    Export:
      Name: !Sub '${EnvironmentName}-DeploymentSNSTopicArn'
