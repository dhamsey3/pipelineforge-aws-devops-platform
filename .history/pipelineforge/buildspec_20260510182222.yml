# buildspec.yml for PipelineForge
version: 0.2
phases:
  install:
    runtime-versions:
      docker: 20
    commands:
      - echo Installing dependencies
  pre_build:
    commands:
      - echo Logging in to Amazon ECR
  build:
    commands:
      - echo Build started on `date`
  post_build:
    commands:
      - echo Build completed on `date`
artifacts:
  files:
    - '**/*'
